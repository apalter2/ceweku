<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>💕 Bucin Level Max 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fbc2eb 0%, #a6c1ee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Video Background */
        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.35;
            filter: blur(10px) brightness(0.6);
            transform: scale(1.1);
        }
        .video-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.1);
        }

        /* Audio Visualizer */
        .audio-visualizer {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            align-items: center;
            height: 44px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 22px;
            border-radius: 40px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }
        .audio-visualizer:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateX(-50%) scale(1.05);
        }
        .audio-bar {
            width: 4px;
            height: 20px;
            background: linear-gradient(to top, #ff6b9d, #a18cd1);
            border-radius: 4px;
            animation: soundWave 0.8s ease-in-out infinite alternate;
            transition: height 0.2s;
        }
        .audio-bar:nth-child(1) { animation-delay: 0.0s; height: 14px; }
        .audio-bar:nth-child(2) { animation-delay: 0.1s; height: 24px; }
        .audio-bar:nth-child(3) { animation-delay: 0.2s; height: 34px; }
        .audio-bar:nth-child(4) { animation-delay: 0.3s; height: 20px; }
        .audio-bar:nth-child(5) { animation-delay: 0.4s; height: 30px; }
        .audio-bar:nth-child(6) { animation-delay: 0.5s; height: 40px; }
        .audio-bar:nth-child(7) { animation-delay: 0.6s; height: 26px; }
        .audio-bar:nth-child(8) { animation-delay: 0.7s; height: 16px; }
        .audio-bar:nth-child(9) { animation-delay: 0.8s; height: 36px; }
        .audio-bar:nth-child(10) { animation-delay: 0.9s; height: 22px; }
        .audio-bar:nth-child(11) { animation-delay: 1.0s; height: 28px; }
        .audio-bar:nth-child(12) { animation-delay: 1.1s; height: 18px; }

        @keyframes soundWave {
            0% { transform: scaleY(0.3); opacity: 0.4; }
            100% { transform: scaleY(1); opacity: 1; }
        }
        .audio-label {
            color: #fff;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 10px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }
        .audio-label .pause-icon { display: none; }
        .audio-visualizer.paused .audio-bar { animation-play-state: paused; opacity: 0.25; }
        .audio-visualizer.paused .play-icon { display: none; }
        .audio-visualizer.paused .pause-icon { display: inline; }

        /* Card */
        .card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(18px);
            border-radius: 40px;
            padding: 40px 32px;
            max-width: 680px;
            width: 100%;
            box-shadow: 0 30px 60px -10px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
            z-index: 2;
            border: 2px solid rgba(255,255,255,0.25);
            animation: fadeIn 0.9s ease-out;
            transition: all 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.85) rotate(-2deg); }
            to { opacity: 1; transform: scale(1) rotate(0); }
        }

        .heart-bg {
            position: absolute;
            font-size: 140px;
            opacity: 0.07;
            top: -30px;
            right: -20px;
            transform: rotate(20deg);
            animation: floatHeart 7s ease-in-out infinite;
        }
        @keyframes floatHeart {
            0%, 100% { transform: rotate(20deg) translateY(0); }
            50% { transform: rotate(30deg) translateY(-12px); }
        }

        h1 {
            color: #d63384;
            font-size: 2.4rem;
            margin-bottom: 6px;
            text-shadow: 0 0 40px rgba(214,51,132,0.15);
            animation: textGlow 3.5s ease-in-out infinite alternate;
            letter-spacing: -0.5px;
        }
        @keyframes textGlow {
            0% { text-shadow: 0 0 20px rgba(214,51,132,0.15); }
            100% { text-shadow: 0 0 50px rgba(214,51,132,0.35), 0 0 80px rgba(214,51,132,0.08); }
        }
        .subtitle {
            color: #6c3483;
            font-size: 1.1rem;
            font-style: italic;
            margin-bottom: 18px;
            animation: subtitlePulse 2.8s ease-in-out infinite;
        }
        @keyframes subtitlePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.65; }
        }

        /* Message Box */
        .message-box {
            background: white;
            border-radius: 24px;
            padding: 22px 18px;
            margin: 16px 0 20px;
            box-shadow: 0 6px 25px rgba(214,51,132,0.12);
            border: 2px solid #f8bbd0;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #4a1942;
            line-height: 1.7;
            transition: 0.3s;
            position: relative;
            flex-wrap: wrap;
            gap: 8px;
        }
        .message-box .sticker-img {
            max-width: 80px;
            max-height: 80px;
            border-radius: 16px;
            object-fit: contain;
            display: block;
            margin: 4px auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        /* Buttons */
        .btn-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 18px 0 12px;
        }
        .btn {
            padding: 11px 22px;
            border: none;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: -50%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            transition: 0.5s;
        }
        .btn:hover::before { transform: rotate(180deg); }
        .btn:hover { transform: translateY(-3px) scale(1.04); }
        .btn:active { transform: scale(0.94); }

        .btn-pink { background: linear-gradient(135deg, #ff6b9d, #c44f8b); color: white; }
        .btn-pink:hover { box-shadow: 0 10px 30px rgba(255,107,157,0.4); }
        .btn-purple { background: linear-gradient(135deg, #a18cd1, #6c3483); color: white; }
        .btn-purple:hover { box-shadow: 0 10px 30px rgba(108,52,131,0.4); }
        .btn-red { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .btn-red:hover { box-shadow: 0 10px 30px rgba(245,87,108,0.4); }
        .btn-orange { background: linear-gradient(135deg, #fbc2eb, #f6d365); color: #4a1942; }
        .btn-orange:hover { box-shadow: 0 10px 30px rgba(246,211,101,0.4); }
        .btn-green { background: linear-gradient(135deg, #84fab0, #8fd3f4); color: #1d4a3a; }
        .btn-green:hover { box-shadow: 0 10px 30px rgba(132,250,176,0.4); }
        .btn-blue { background: linear-gradient(135deg, #89CFF0, #4A90D9); color: white; }
        .btn-blue:hover { box-shadow: 0 10px 30px rgba(74,144,217,0.4); }
        .btn-yellow { background: linear-gradient(135deg, #f6d365, #fda085); color: #4a1942; }
        .btn-yellow:hover { box-shadow: 0 10px 30px rgba(253,160,133,0.4); }
        .btn-teal { background: linear-gradient(135deg, #a8edea, #fed6e3); color: #1a4a4a; }
        .btn-teal:hover { box-shadow: 0 10px 30px rgba(168,237,234,0.4); }
        .btn-coral { background: linear-gradient(135deg, #ffecd2, #fcb69f); color: #4a1942; }
        .btn-coral:hover { box-shadow: 0 10px 30px rgba(252,182,159,0.4); }

        /* Tombol Bucin Spesial (Yes / No) */
        .bucin-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 16px 0 12px;
            flex-wrap: wrap;
        }
        .btn-bucin {
            padding: 16px 40px;
            border: none;
            border-radius: 80px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            letter-spacing: 0.5px;
            min-width: 140px;
            position: relative;
        }
        .btn-bucin-yes {
            background: linear-gradient(135deg, #ff6b9d, #e8436e);
            color: white;
        }
        .btn-bucin-yes:hover {
            transform: scale(1.08) rotate(-2deg);
            box-shadow: 0 12px 40px rgba(232, 67, 110, 0.5);
        }
        .btn-bucin-no {
            background: linear-gradient(135deg, #b8b8b8, #8a8a8a);
            color: white;
        }
        .btn-bucin-no:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }
        .btn-bucin-no:active {
            transform: scale(0.95);
        }

        /* Tombol lanjut (Next) */
        .btn-next {
            background: linear-gradient(135deg, #a18cd1, #6c3483);
            color: white;
            padding: 14px 40px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin: 18px 0 10px;
            box-shadow: 0 8px 30px rgba(108,52,131,0.3);
        }
        .btn-next:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(108,52,131,0.5);
        }

        /* Telegram */
        .btn-telegram {
            background: linear-gradient(135deg, #0088cc, #004d7a);
            color: white;
            padding: 14px 28px;
            font-size: 1rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 25px rgba(0,136,204,0.35);
            margin-top: 10px;
            width: 100%;
            justify-content: center;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }
        .btn-telegram::before {
            content: '';
            position: absolute;
            inset: -50%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            transition: 0.5s;
        }
        .btn-telegram:hover::before { transform: rotate(180deg); }
        .btn-telegram:hover { transform: scale(1.02); box-shadow: 0 10px 40px rgba(0,136,204,0.5); }
        .btn-telegram .credit-text { font-size: 0.65rem; opacity: 0.7; }

        /* Popup Telegram */
        .telegram-popup {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            animation: popupFade 0.4s ease;
        }
        .telegram-popup.active { display: flex; }
        @keyframes popupFade {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        .popup-content {
            background: white;
            border-radius: 36px;
            padding: 40px 32px;
            max-width: 440px;
            width: 92%;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.3);
            position: relative;
        }
        .popup-content .close-btn {
            position: absolute;
            top: 14px;
            right: 18px;
            font-size: 1.6rem;
            background: none;
            border: none;
            cursor: pointer;
            color: #aaa;
            transition: 0.3s;
        }
        .popup-content .close-btn:hover { color: #d63384; transform: rotate(90deg); }
        .popup-content .popup-icon { font-size: 3.8rem; margin-bottom: 10px; }
        .popup-content h2 { color: #d63384; margin-bottom: 6px; }
        .popup-content p { color: #555; line-height: 1.6; margin-bottom: 16px; }
        .popup-btn {
            background: linear-gradient(135deg, #0088cc, #004d7a);
            color: white;
            padding: 14px 34px;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .popup-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(0,136,204,0.4); }

        .counter {
            margin-top: 14px;
            color: #6c3483;
            background: rgba(248,187,208,0.25);
            padding: 8px 22px;
            border-radius: 60px;
            display: inline-block;
            font-weight: 500;
            animation: pulse 2.4s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }

        /* Floating elements */
        .floating-hearts {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }
        .heart-float {
            position: absolute;
            font-size: 1.6rem;
            animation: floatUp linear forwards;
            opacity: 0.8;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.4); opacity: 0.9; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(1.3); opacity: 0; }
        }

        .particle-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            animation: particleFloat 18s infinite linear;
            opacity: 0;
        }
        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            font-size: 22px;
            animation: sparkleAnim 0.9s ease-out forwards;
        }
        @keyframes sparkleAnim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(2.2) rotate(200deg); opacity: 0; }
        }

        /* Sticker tengah */
        .sticker-center {
            display: block;
            margin: 8px auto;
            max-width: 100px;
            max-height: 100px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            object-fit: contain;
        }

        /* Hide/Show */
        .hidden { display: none !important; }
        .stage { transition: all 0.4s ease; }

        @media (max-width: 480px) {
            .card { padding: 22px 16px; }
            h1 { font-size: 1.8rem; }
            .message-box { font-size: 1rem; padding: 18px 12px; min-height: 90px; }
            .btn { padding: 9px 14px; font-size: 0.8rem; }
            .btn-bucin { padding: 14px 20px; font-size: 1.1rem; min-width: 110px; }
            .audio-visualizer { bottom: 12px; padding: 6px 14px; }
            .audio-bar { width: 3px; }
        }
    </style>
</head>
<body>

    <!-- Video BG -->
    <div class="video-bg">
        <video id="bgVideo" muted loop playsinline autoplay>
            <source src="https://files.catbox.moe/m2h74c.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Audio Visualizer -->
    <div class="audio-visualizer" id="audioVisualizer">
        <div class="audio-bar"></div><div class="audio-bar"></div><div class="audio-bar"></div>
        <div class="audio-bar"></div><div class="audio-bar"></div><div class="audio-bar"></div>
        <div class="audio-bar"></div><div class="audio-bar"></div><div class="audio-bar"></div>
        <div class="audio-bar"></div><div class="audio-bar"></div><div class="audio-bar"></div>
        <span class="audio-label"><span class="play-icon">🎵</span><span class="pause-icon">⏸️</span> Musik</span>
    </div>

    <!-- Particles -->
    <div class="particle-container" id="particleContainer"></div>

    <!-- Floating Hearts -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <!-- Telegram Popup -->
    <div class="telegram-popup" id="telegramPopup">
        <div class="popup-content">
            <button class="close-btn" id="popupClose">✕</button>
            <div class="popup-icon">💕</div>
            <h2>Kirim Cinta ke Telegram?</h2>
            <p>Kamu akan diarahkan ke <strong>@lyzvldx</strong> dengan pesan cinta 💌</p>
            <p style="font-size:0.95rem; color:#888;" id="popupMessagePreview">"Aku suka kamu! 💕"</p>
            <button class="popup-btn" id="popupConfirm">📱 Kirim ke Telegram</button>
        </div>
    </div>

    <!-- MAIN CARD -->
    <div class="card" id="mainCard">
        <div class="heart-bg">❤️</div>
        <h1 id="mainTitle">💖 Bucin Level Max 💖</h1>
        <div class="subtitle" id="mainSubtitle">— khusus untuk kamu yang selalu di hati —</div>

        <div class="message-box" id="messageDisplay">
            <span id="messageText">Halo, selamat datang! 💕</span>
        </div>

        <!-- STAGE 1: Sambutan & Tombol Lanjut -->
        <div id="stageWelcome" class="stage">
            <button class="btn-next" id="btnNext">Lanjut ➜</button>
        </div>

        <!-- STAGE 2: Pertanyaan Bucin (YES / NO) -->
        <div id="stageQuestion" class="stage hidden">
            <div class="bucin-group">
                <button class="btn-bucin btn-bucin-yes" id="btnYes">💕 Iya, Sayang!</button>
                <button class="btn-bucin btn-bucin-no" id="btnNo">😅 Tidak</button>
            </div>
        </div>

        <!-- STAGE 3: Semua Tombol Gombal & Telegram (muncul setelah jawab) -->
        <div id="stageAllButtons" class="stage hidden">
            <div class="btn-container">
                <button class="btn btn-pink" id="btnSayang">💕 Cinta</button>
                <button class="btn btn-purple" id="btnRindu">🌙 Rindu</button>
                <button class="btn btn-red" id="btnKejutan">🎁 Kejutan</button>
                <button class="btn btn-orange" id="btnLucu">😄 Lucu</button>
                <button class="btn btn-green" id="btnHujan">💗 Hujan Hati</button>
                <button class="btn btn-blue" id="btnGalau">😅 Galau</button>
                <button class="btn btn-yellow" id="btnPujian">🌟 Pujian</button>
                <button class="btn btn-teal" id="btnImut">🥰 Imut</button>
                <button class="btn btn-coral" id="btnRandom">✨ Random</button>
            </div>

            <!-- Telegram -->
            <button class="btn-telegram" id="btnTelegram">
                <span>✈️</span> Cheated by @lyzvldx
                <span class="credit-text">• Kirim Cinta 💕</span>
            </button>

            <div class="counter" id="counterDisplay">❤️ 0 kali kamu membuatku tersenyum</div>
        </div>
    </div>

    <!-- Audio -->
    <audio id="bgAudio" loop autoplay>
        <source src="https://files.catbox.moe/cg22ol.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ============================================================
        //  AUTO PLAY AUDIO & VIDEO
        // ============================================================
        const bgAudio = document.getElementById('bgAudio');
        const bgVideo = document.getElementById('bgVideo');
        const audioVisualizer = document.getElementById('audioVisualizer');
        let isAudioPlaying = true;

        function tryAutoPlay() {
            bgAudio.play().catch(() => {});
        }
        bgVideo.play().catch(() => {});

        audioVisualizer.addEventListener('click', () => {
            if (isAudioPlaying) {
                bgAudio.pause();
                audioVisualizer.classList.add('paused');
                isAudioPlaying = false;
            } else {
                bgAudio.play().catch(() => {});
                audioVisualizer.classList.remove('paused');
                isAudioPlaying = true;
            }
        });
        bgAudio.addEventListener('play', () => {
            audioVisualizer.classList.remove('paused');
            isAudioPlaying = true;
        });
        bgAudio.addEventListener('pause', () => {
            audioVisualizer.classList.add('paused');
            isAudioPlaying = false;
        });

        document.addEventListener('click', function firstInteraction() {
            tryAutoPlay();
            document.removeEventListener('click', firstInteraction);
        });

        // ============================================================
        //  STICKER
        // ============================================================
        const STICKER_SAYANG = '🥰💕';
        const STICKER_BUCIN = '😍💖';
        const STICKER_YES = '💖😘';
        const STICKER_NO = '😅💔';

        // ============================================================
        //  TELEGRAM
        // ============================================================
        const btnTelegram = document.getElementById('btnTelegram');
        const telegramPopup = document.getElementById('telegramPopup');
        const popupClose = document.getElementById('popupClose');
        const popupConfirm = document.getElementById('popupConfirm');
        const popupMessagePreview = document.getElementById('popupMessagePreview');

        const loveMessages = [
            'Aku suka kamu! 💕', 'Kamu segalanya! ❤️', 'Aku sayang banget! 💖',
            'Kamu membuatku bahagia! ✨', 'Aku selalu mikirin kamu! 🌙',
            'Kamu yang terbaik! 🌟', 'Cintaku hanya untukmu! 💘', 'Kamu luar biasa! 🥰'
        ];
        function getRandomLoveMessage() {
            return loveMessages[Math.floor(Math.random() * loveMessages.length)];
        }

        btnTelegram.addEventListener('click', () => {
            telegramPopup.classList.add('active');
            const msg = getRandomLoveMessage();
            popupMessagePreview.textContent = `"${msg}"`;
            createFloatingHearts(12);
        });
        popupClose.addEventListener('click', () => telegramPopup.classList.remove('active'));
        telegramPopup.addEventListener('click', (e) => {
